# AI-Ready CI/CD Pipeline - Optimized Version
# Project: 智企连·AI-Ready
# Version: v2.0 (Optimized)
# Last Updated: 2026-04-03
# 
# 优化内容：
# 1. Maven依赖缓存优化（增量构建）
# 2. 测试并行化（JUnit5并行执行）
# 3. Docker构建缓存分层
# 4. 构建矩阵并行
# 5. 条件触发优化

name: AI-Ready CI/CD Pipeline (Optimized)

on:
  push:
    branches:
      - main
      - develop
      - feature/*
    paths:
      - 'src/**'
      - 'core-api/**'
      - 'smart-admin-web/**'
      - 'pom.xml'
      - 'Dockerfile*'
      - '.github/workflows/ci-optimized.yml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_tests:
        description: 'Skip tests (emergency only)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  MAVEN_OPTS: '-Dmaven.repo.local=$HOME/.m2/repository -Xmx2048m -XX:+TieredCompilation -XX:TieredStopAtLevel=1'

# 并发控制：同一分支只允许一个运行实例
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 阶段1: 变更检测（快速跳过不必要的构建）
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'core-api/**'
              - 'src/**'
              - 'pom.xml'
              - 'Dockerfile*'
            frontend:
              - 'smart-admin-web/**'
              - 'web/**'
            infra:
              - 'k8s/**'
              - '.github/workflows/**'

  # ============================================
  # 阶段2: 并行代码检查（矩阵并行）
  # ============================================
  lint:
    name: Code Analysis
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        analyzer: [checkstyle, spotbugs, pmd]
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17 with Cache
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven Repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-
            maven-

      - name: Run ${{ matrix.analyzer }}
        run: |
          case "${{ matrix.analyzer }}" in
            checkstyle) mvn checkstyle:check -B ;;
            spotbugs) mvn spotbugs:check -B ;;
            pmd) mvn pmd:check -B ;;
          esac
        continue-on-error: true

  # ============================================
  # 阶段3: 并行单元测试（分片执行）
  # ============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.backend == 'true' && github.event.inputs.skip_tests != 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17 with Cache
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven Repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Run Unit Tests (Shard ${{ matrix.shard }}/4)
        run: |
          mvn test -B \
            -Dsurefire.rerunFailingTestsCount=2 \
            -Dsurefire.parallel=classes \
            -Dsurefire.threadCount=4 \
            -Dsurefire.useSystemClassLoader=false
        env:
          TEST_SHARD: ${{ matrix.shard }}
          TOTAL_SHARDS: 4

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: |
            target/surefire-reports/
            target/site/jacoco/
          retention-days: 7

  # ============================================
  # 阶段4: 构建应用（后端+前端并行）
  # ============================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.backend == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
      cache-hit: ${{ steps.cache-maven.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17 with Cache
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven Repository (Incremental)
        id: cache-maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-build-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}-${{ github.sha }}
          restore-keys: |
            maven-build-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}-
            maven-${{ runner.os }}-

      - name: Build with Maven (Offline if cached)
        run: |
          if [ "${{ steps.cache-maven.outputs.cache-hit }}" == "true" ]; then
            mvn clean package -B -o -DskipTests
          else
            mvn clean package -B -DskipTests
          fi

      - name: Extract Version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: core-api/target/*.jar
          retention-days: 7

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with Cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'smart-admin-web/package-lock.json'

      - name: Cache npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('smart-admin-web/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install Dependencies
        working-directory: smart-admin-web
        run: npm ci --prefer-offline --no-audit

      - name: Build Frontend
        working-directory: smart-admin-web
        run: npm run build:prod
        env:
          CI: false
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: smart-admin-web/dist/
          retention-days: 7

  # ============================================
  # 阶段5: Docker构建（分层缓存优化）
  # ============================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: core-api/target

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: smart-admin-web/dist
        continue-on-error: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Layer Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            docker-${{ runner.os }}-

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.build-backend.outputs.version || 'latest' }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=long
            type=ref,event=branch

      - name: Build and Push (Layered Cache)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ needs.build-backend.outputs.version || 'dev' }}
            REVISION=${{ github.sha }}

      - name: Move Cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ============================================
  # 阶段6: 安全扫描
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'
    steps:
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker-build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # 阶段7: 并行部署（多环境）
  # ============================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    environment:
      name: dev
      url: https://dev.ai-ready.io
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: Deploy with Rollout Check
        run: |
          kubectl apply -f k8s/dev/
          kubectl set image deployment/ai-ready-api \
            ai-ready-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker-build.outputs.image-tag }} \
            -n dev
          kubectl rollout status deployment/ai-ready-api -n dev --timeout=300s

      - name: Health Check
        run: |
          kubectl wait --for=condition=ready pod -l app=ai-ready-api -n dev --timeout=120s
          kubectl get pods -n dev -l app=ai-ready-api

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, deploy-dev]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.ai-ready.io
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy with Rollout Check
        run: |
          kubectl apply -f k8s/staging/
          kubectl set image deployment/ai-ready-api \
            ai-ready-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker-build.outputs.image-tag }} \
            -n staging
          kubectl rollout status deployment/ai-ready-api -n staging --timeout=300s

      - name: Smoke Tests
        run: |
          for i in {1..10}; do
            RESPONSE=$(kubectl exec -n staging deployment/ai-ready-api -- curl -s http://localhost:8080/actuator/health)
            if [[ "$RESPONSE" == *"UP"* ]]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed"
          exit 1

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, deploy-staging]
    if: github.event.inputs.environment == 'prod'
    environment:
      name: prod
      url: https://prod.ai-ready.io
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Pre-deployment Check
        run: |
          echo "=== Current Production State ==="
          kubectl get pods -n prod -l app=ai-ready-api
          kubectl get svc -n prod

      - name: Deploy with Blue-Green Strategy
        run: |
          # Blue-Green Deployment
          kubectl apply -f k8s/prod/
          kubectl set image deployment/ai-ready-api \
            ai-ready-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker-build.outputs.image-tag }} \
            -n prod
          kubectl rollout status deployment/ai-ready-api -n prod --timeout=600s

      - name: Post-deployment Verification
        run: |
          kubectl get pods -n prod -l app=ai-ready-api
          kubectl logs -n prod -l app=ai-ready-api --tail=50

  # ============================================
  # 阶段8: 通知
  # ============================================
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always()
    steps:
      - name: Send Success Notification
        if: success()
        run: |
          curl -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"✅ AI-Ready Deployment Success - Branch: ${{ github.ref_name }}, Env: ${{ github.event.inputs.environment || 'dev' }}"}'
        
      - name: Send Failure Notification
        if: failure()
        run: |
          curl -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"❌ AI-Ready Deployment Failed - Branch: ${{ github.ref_name }}, Job: ${{ github.job }}"}'
