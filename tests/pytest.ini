[pytest]
# 测试目录
testpaths = tests

# 测试文件命名规则
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    smoke: 冒烟测试标记
    regression: 回归测试标记
    api: API测试标记
    ui: UI测试标记
    unit: 单元测试标记
    integration: 集成测试标记
    e2e: 端到端测试标记
    performance: 性能测试标记
    security: 安全测试标记
    slow: 慢速测试标记
    critical: 关键测试标记
    skip_if_no_service: 无服务时跳过标记

# 默认选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 超时设置（使用pytest-timeout插件）
timeout = 300
timeout_method = thread