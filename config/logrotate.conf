# AI-Ready logrotate配置
# 放置于 /etc/logrotate.d/ai-ready

/var/log/ai-ready/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appuser appgroup
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        # 通知应用重新打开日志文件
        kill -USR1 $(cat /var/run/ai-ready.pid 2>/dev/null) 2>/dev/null || true
    endscript
}

/var/log/ai-ready/error/*.log {
    daily
    rotate 60
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appuser appgroup
    dateext
}

/var/log/ai-ready/gc/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appuser appgroup
}
