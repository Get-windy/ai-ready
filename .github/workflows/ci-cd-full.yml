# AI-Ready 完整CI/CD流水线配置
# 包含：代码检查、测试、构建、安全扫描、部署
# Version: v2.0.0

name: AI-Ready CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '21'
  NODE_VERSION: '18'

# ============ 并发控制 ============
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # CI阶段：代码检查、测试、质量分析
  # ═══════════════════════════════════════════════════════════

  # ============ 代码检查 ============
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 缓存Maven依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 代码风格检查
        run: |
          ./mvnw checkstyle:check -B || true
        continue-on-error: true

      - name: 代码格式化检查
        run: |
          ./mvnw spotless:check -B || true
        continue-on-error: true

  # ============ 单元测试 ============
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 缓存Maven依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: 运行单元测试
        run: |
          ./mvnw test \
            -Dmaven.test.failure.ignore=false \
            -Djacoco.skip=false \
            -B

      - name: 生成覆盖率报告
        run: |
          ./mvnw jacoco:report -B

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 30

      - name: 上传覆盖率到Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/target/site/jacoco/jacoco.xml'
          fail_ci_if_error: false
          verbose: true

  # ============ 集成测试 ============
  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 运行集成测试
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
        run: |
          ./mvnw verify \
            -Dtest.profile=integration \
            -Dspring.profiles.active=test \
            -B

      - name: 上传集成测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: '**/target/failsafe-reports/'
          retention-days: 30

  # ============ 代码质量分析 ============
  code-quality:
    name: 代码质量分析
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: SonarCloud扫描
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=${{ github.repository_owner }}_ai-ready \
            -Dsonar.organization=${{ github.repository_owner }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -B
        continue-on-error: true

      - name: 初始化CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: 执行CodeQL分析
        uses: github/codeql-action/analyze@v3

  # ═══════════════════════════════════════════════════════════
  # 构建阶段：打包、镜像构建
  # ═══════════════════════════════════════════════════════════

  # ============ 构建 ============
  build:
    name: 构建应用
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 缓存Maven依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: 构建应用
        run: |
          ./mvnw clean package -DskipTests -B -T 2C

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: |
            core-api/target/*.jar
            !core-api/target/*-tests.jar
          retention-days: 1

  # ============ 构建Docker镜像 ============
  docker-build:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器镜像仓库
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取版本号
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            VERSION=latest
          else
            VERSION=${GITHUB_REF#refs/heads/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 提取Docker元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 构建并推送镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ steps.version.outputs.version }}

      - name: 生成构建证明
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ═══════════════════════════════════════════════════════════
  # 安全阶段：漏洞扫描、依赖检查
  # ═══════════════════════════════════════════════════════════

  # ============ 安全扫描 ============
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 运行Trivy漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.docker-build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: 上传Trivy扫描结果
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 运行Snyk安全扫描
        if: github.event_name != 'pull_request'
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  # ============ 依赖检查 ============
  dependency-check:
    name: 依赖安全检查
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 运行OWASP依赖检查
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -B
        continue-on-error: true

      - name: 上传依赖检查报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: '**/target/dependency-check-report.html'
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # 部署阶段：Dev/Staging/Prod
  # ═══════════════════════════════════════════════════════════

  # ============ 部署到开发环境 ============
  deploy-dev:
    name: 部署到开发环境
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.ai-ready.cn
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 配置kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > ~/.kube/config

      - name: 部署到Kubernetes
        run: |
          kubectl set image deployment/ai-ready-api \
            ai-ready-api=${{ needs.docker-build.outputs.image-tag }} \
            -n ai-ready-dev
          
          kubectl rollout status deployment/ai-ready-api \
            -n ai-ready-dev \
            --timeout=300s

      - name: 验证部署
        run: |
          kubectl get pods -n ai-ready-dev -l app=ai-ready-api
          kubectl logs -n ai-ready-dev -l app=ai-ready-api --tail=50

      - name: 运行冒烟测试
        run: |
          curl -f https://dev.ai-ready.cn/actuator/health || exit 1

  # ============ 部署到预发布环境 ============
  deploy-staging:
    name: 部署到预发布环境
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.ai-ready.cn
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 配置kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: 部署到Kubernetes
        run: |
          kubectl set image deployment/ai-ready-api \
            ai-ready-api=${{ needs.docker-build.outputs.image-tag }} \
            -n ai-ready-staging
          
          kubectl rollout status deployment/ai-ready-api \
            -n ai-ready-staging \
            --timeout=300s

      - name: 运行集成测试
        run: |
          # 执行E2E测试
          echo "Running E2E tests..."

  # ============ 部署到生产环境 ============
  deploy-prod:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://prod.ai-ready.cn
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 配置kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: 部署前检查
        run: |
          # 检查当前部署状态
          kubectl get deployment ai-ready-api -n ai-ready-prod
          
          # 检查Pod健康状态
          kubectl get pods -n ai-ready-prod -l app=ai-ready-api

      - name: 部署到Kubernetes
        run: |
          kubectl set image deployment/ai-ready-api \
            ai-ready-api=${{ needs.docker-build.outputs.image-tag }} \
            -n ai-ready-prod \
            --record
          
          kubectl rollout status deployment/ai-ready-api \
            -n ai-ready-prod \
            --timeout=600s

      - name: 部署后验证
        run: |
          # 检查Pod状态
          kubectl get pods -n ai-ready-prod -l app=ai-ready-api
          
          # 检查服务状态
          kubectl get svc -n ai-ready-prod
          
          # 健康检查
          curl -f https://prod.ai-ready.cn/actuator/health || exit 1

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ 回滚 ============
  rollback:
    name: 回滚部署
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-prod.result == 'failure'
    needs: deploy-prod
    steps:
      - name: 设置kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 配置kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: 执行回滚
        run: |
          kubectl rollout undo deployment/ai-ready-api -n ai-ready-prod
          kubectl rollout status deployment/ai-ready-api -n ai-ready-prod --timeout=300s

  # ═══════════════════════════════════════════════════════════
  # 通知阶段
  # ═══════════════════════════════════════════════════════════

  # ============ 通知 ============
  notify:
    name: 发送通知
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always()
    steps:
      - name: 发送钉钉通知
        if: always()
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DINGTALK_TOKEN }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "AI-Ready CI/CD 通知",
                "text": "## AI-Ready CI/CD 通知\n\n- **分支**: ${{ github.ref_name }}\n- **提交**: ${{ github.sha }}\n- **状态**: ${{ job.status }}\n- **触发者**: ${{ github.actor }}\n- **环境**: ${{ github.event.inputs.environment || '自动' }}\n"
              }
            }
        continue-on-error: true
