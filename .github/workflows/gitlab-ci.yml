# GitLab CI/CD Configuration for AI-Ready
# Compatible with GitLab 15.x+
# Project: 智企连·AI-Ready

stages:
  - lint
  - test
  - build
  - docker
  - deploy-dev
  - deploy-staging
  - deploy-prod
  - rollback

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx1024m"
  DOCKER_REGISTRY: registry.gitlab.com
  DOCKER_IMAGE: $DOCKER_REGISTRY/$CI_PROJECT_PATH
  JAVA_VERSION: "17"
  KUBE_NAMESPACE_DEV: ai-ready-dev
  KUBE_NAMESPACE_STAGING: ai-ready-staging
  KUBE_NAMESPACE_PROD: ai-ready-prod

# Cache configuration
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/
    - target/

# ============================================
# Stage: lint - Code Quality Analysis
# ============================================
lint:checkstyle:
  stage: lint
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn checkstyle:check -B || true
  allow_failure: true
  artifacts:
    reports:
      codequality: target/checkstyle-result.xml

lint:spotbugs:
  stage: lint
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn spotbugs:check -B || true
  allow_failure: true

lint:sonarqube:
  stage: lint
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn sonar:sonar -Dsonar.host.url=$SONAR_URL -Dsonar.login=$SONAR_TOKEN
  only:
    - main
    - develop

# ============================================
# Stage: test - Unit & Integration Tests
# ============================================
test:unit:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn test -B
    - cat target/site/jacoco/index.html
  artifacts:
    paths:
      - target/surefire-reports/
      - target/site/jacoco/
    expire_in: 7 days
    reports:
      junit: target/surefire-reports/*.xml
      coverage_report:
        coverage_format: jacoco
        path: target/site/jacoco/jacoco.xml

test:integration:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  services:
    - name: postgres:14
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: testuser
    POSTGRES_PASSWORD: testpass
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
    SPRING_REDIS_HOST: redis
  script:
    - mvn verify -B -Dtest.skip=true -Dfailsafe.rerunFailingTestsCount=2
  artifacts:
    paths:
      - target/failsafe-reports/
    expire_in: 7 days

# ============================================
# Stage: build - Compile & Package
# ============================================
build:jar:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn clean package -B -DskipTests
    - VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
    - echo "APP_VERSION=${VERSION}" >> build.env
    - echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> build.env
  artifacts:
    paths:
      - core-api/target/*.jar
    expire_in: 7 days
    reports:
      dotenv: build.env

build:frontend:
  stage: build
  image: node:18-alpine
  script:
    - cd smart-admin-web
    - npm ci --registry=https://registry.npmmirror.com
    - npm run build:prod
  artifacts:
    paths:
      - smart-admin-web/dist/
    expire_in: 7 days
  only:
    changes:
      - smart-admin-web/**/*

# ============================================
# Stage: docker - Build & Push Images
# ============================================
docker:build:
  stage: docker
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $DOCKER_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest
    - echo "DOCKER_IMAGE_TAG=$CI_COMMIT_SHA" >> docker.env
  artifacts:
    reports:
      dotenv: docker.env
  only:
    - main
    - develop
    - /^release\/.*$/

docker:scan:
  stage: docker
  image: docker:24-cli
  script:
    - docker pull $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock
      aquasec/trivy:latest image --exit-code 1 --severity HIGH,CRITICAL
      $DOCKER_IMAGE:$CI_COMMIT_SHA
  allow_failure: true
  only:
    - main

# ============================================
# Stage: deploy-dev - Development Environment
# ============================================
deploy:dev:
  stage: deploy-dev
  image: bitnami/kubectl:latest
  environment:
    name: development
    url: https://dev.ai-ready.cn
  before_script:
    - kubectl config set-cluster k8s-dev --server=$KUBE_API_SERVER_DEV
    - kubectl config set-credentials admin --token=$KUBE_TOKEN_DEV
    - kubectl config set-context dev --cluster=k8s-dev --user=admin --namespace=$KUBE_NAMESPACE_DEV
    - kubectl config use-context dev
  script:
    - kubectl apply -f k8s/base/ -n $KUBE_NAMESPACE_DEV
    - kubectl apply -f k8s/dev/ -n $KUBE_NAMESPACE_DEV
    - kubectl set image deployment/ai-ready-api ai-ready-api=$DOCKER_IMAGE:$CI_COMMIT_SHA -n $KUBE_NAMESPACE_DEV
    - kubectl rollout status deployment/ai-ready-api -n $KUBE_NAMESPACE_DEV --timeout=300s
    - kubectl get pods -n $KUBE_NAMESPACE_DEV -l app=ai-ready-api
  after_script:
    - kubectl logs -n $KUBE_NAMESPACE_DEV -l app=ai-ready-api --tail=100
  only:
    - develop
  when: manual

# ============================================
# Stage: deploy-staging - Staging Environment
# ============================================
deploy:staging:
  stage: deploy-staging
  image: bitnami/kubectl:latest
  environment:
    name: staging
    url: https://staging.ai-ready.cn
  before_script:
    - kubectl config set-cluster k8s-staging --server=$KUBE_API_SERVER_STAGING
    - kubectl config set-credentials admin --token=$KUBE_TOKEN_STAGING
    - kubectl config set-context staging --cluster=k8s-staging --user=admin --namespace=$KUBE_NAMESPACE_STAGING
    - kubectl config use-context staging
  script:
    - kubectl apply -f k8s/base/ -n $KUBE_NAMESPACE_STAGING
    - kubectl apply -f k8s/staging/ -n $KUBE_NAMESPACE_STAGING
    - kubectl set image deployment/ai-ready-api ai-ready-api=$DOCKER_IMAGE:$CI_COMMIT_SHA -n $KUBE_NAMESPACE_STAGING
    - kubectl rollout status deployment/ai-ready-api -n $KUBE_NAMESPACE_STAGING --timeout=300s
    - |
      # Health check
      for i in {1..10}; do
        RESPONSE=$(kubectl exec -n $KUBE_NAMESPACE_STAGING deployment/ai-ready-api -- curl -s http://localhost:8080/actuator/health || echo "failed")
        if [[ "$RESPONSE" == *"UP"* ]]; then
          echo "Health check passed"
          break
        fi
        sleep 10
      done
  only:
    - main
  when: manual

# ============================================
# Stage: deploy-prod - Production Environment
# ============================================
deploy:prod:
  stage: deploy-prod
  image: bitnami/kubectl:latest
  environment:
    name: production
    url: https://prod.ai-ready.cn
  before_script:
    - kubectl config set-cluster k8s-prod --server=$KUBE_API_SERVER_PROD
    - kubectl config set-credentials admin --token=$KUBE_TOKEN_PROD
    - kubectl config set-context prod --cluster=k8s-prod --user=admin --namespace=$KUBE_NAMESPACE_PROD
    - kubectl config use-context prod
  script:
    - |
      # Pre-deployment checks
      echo "=== Pre-deployment verification ==="
      kubectl get pods -n $KUBE_NAMESPACE_PROD -l app=ai-ready-api
      
      # Apply configurations
      kubectl apply -f k8s/base/ -n $KUBE_NAMESPACE_PROD
      kubectl apply -f k8s/prod/ -n $KUBE_NAMESPACE_PROD
      
      # Update image
      kubectl set image deployment/ai-ready-api ai-ready-api=$DOCKER_IMAGE:$CI_COMMIT_SHA -n $KUBE_NAMESPACE_PROD
      
      # Wait for rollout
      kubectl rollout status deployment/ai-ready-api -n $KUBE_NAMESPACE_PROD --timeout=600s
      
      # Post-deployment verification
      echo "=== Post-deployment verification ==="
      kubectl get pods -n $KUBE_NAMESPACE_PROD -l app=ai-ready-api
      kubectl get svc -n $KUBE_NAMESPACE_PROD
  after_script:
    - |
      # If deployment failed, trigger rollback notification
      if [ $CI_JOB_STATUS == "failed" ]; then
        curl -X POST $WEBHOOK_URL \
          -H "Content-Type: application/json" \
          -d '{"text":"⚠️ AI-Ready Production Deployment Failed - Commit: $CI_COMMIT_SHA"}'
      fi
  only:
    - /^release\/.*$/
  when: manual
  tags:
    - production

# ============================================
# Stage: rollback - Emergency Rollback
# ============================================
rollback:prod:
  stage: rollback
  image: bitnami/kubectl:latest
  environment:
    name: production
  before_script:
    - kubectl config set-cluster k8s-prod --server=$KUBE_API_SERVER_PROD
    - kubectl config set-credentials admin --token=$KUBE_TOKEN_PROD
    - kubectl config set-context prod --cluster=k8s-prod --user=admin --namespace=$KUBE_NAMESPACE_PROD
    - kubectl config use-context prod
  script:
    - |
      # List recent deployments
      kubectl rollout history deployment/ai-ready-api -n $KUBE_NAMESPACE_PROD
      
      # Rollback to previous version
      kubectl rollout undo deployment/ai-ready-api -n $KUBE_NAMESPACE_PROD
      
      # Wait for rollback
      kubectl rollout status deployment/ai-ready-api -n $KUBE_NAMESPACE_PROD --timeout=300s
      
      # Verify rollback
      kubectl get pods -n $KUBE_NAMESPACE_PROD -l app=ai-ready-api
  when: manual
  only:
    - main
  tags:
    - production

# ============================================
# Notifications
# ============================================
notify:success:
  stage: .post
  script:
    - curl -X POST $WEBHOOK_URL \
      -H "Content-Type: application/json" \
      -d '{"text":"✅ AI-Ready Pipeline Completed - Branch: $CI_COMMIT_REF_NAME, Commit: $CI_COMMIT_SHA"}'
  when: on_success
  only:
    - main
    - develop

notify:failure:
  stage: .post
  script:
    - curl -X POST $WEBHOOK_URL \
      -H "Content-Type: application/json" \
      -d '{"text":"❌ AI-Ready Pipeline Failed - Branch: $CI_COMMIT_REF_NAME, Job: $CI_JOB_NAME"}'
  when: on_failure