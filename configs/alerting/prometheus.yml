# Prometheus Configuration for AI-Ready Project
# Project: 智企连·AI-Ready
# Version: v1.0
# Last Updated: 2026-03-28

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ai-ready-monitor'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # AI-Ready API Service
  - job_name: 'ai-ready-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8080']
    labels:
      service: 'ai-ready-api'
      environment: 'production'
    scrape_interval: 15s
    scrape_timeout: 10s

  # PostgreSQL Database
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
    labels:
      service: 'postgresql'
      environment: 'production'
    scrape_interval: 30s

  # Redis Cache
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    labels:
      service: 'redis'
      environment: 'production'
    scrape_interval: 15s

  # RocketMQ
  - job_name: 'rocketmq'
    static_configs:
      - targets: ['rocketmq-exporter:50070']
    labels:
      service: 'rocketmq'
      environment: 'production'
    scrape_interval: 30s

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    labels:
      service: 'node'
      environment: 'production'
    scrape_interval: 15s

# Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    labels:
      service: 'prometheus'
      environment: 'production'
