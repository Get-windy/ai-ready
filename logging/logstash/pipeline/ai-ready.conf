# AI-Ready Logstash Pipeline Configuration
# Version: v1.0

input {
  # 从Filebeat接收日志
  beats {
    port => 5044
    ssl => false
    tags => ["filebeat"]
  }

  # 从TCP接收日志 (应用直接发送)
  tcp {
    port => 5000
    codec => json_lines
    tags => ["tcp", "application"]
  }

  # 从Kafka接收日志
  # kafka {
  #   bootstrap_servers => "kafka1:9092,kafka2:9092"
  #   topics => ["ai-ready-logs"]
  #   codec => json
  #   tags => ["kafka"]
  # }
}

filter {
  # 解析JSON日志
  if [log_type] == "application" {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }

    # 提取日志级别
    if [parsed][level] {
      mutate {
        rename => { "[parsed][level]" => "log_level" }
      }
    }

    # 提取trace_id用于链路追踪
    if [parsed][trace_id] {
      mutate {
        rename => { "[parsed][trace_id]" => "trace_id" }
      }
    }

    # 提取服务名称
    if [parsed][service] {
      mutate {
        rename => { "[parsed][service]" => "service_name" }
      }
    }
  }

  # 解析错误日志堆栈
  if [log_type] == "error" and [message] =~ /^\s*at\s/ {
    grok {
      match => {
        "message" => "^\s*at\s+%{DATA:exception_class}\.%{DATA:exception_method}\(%{DATA:exception_file}:%{NUMBER:exception_line}\)"
      }
    }
  }

  # 解析HTTP访问日志
  if [log_type] == "access" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{USERNAME:user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status} %{NUMBER:bytes} "%{DATA:referrer}" "%{DATA:user_agent}" %{NUMBER:response_time}'
      }
    }

    # 转换响应时间为毫秒
    if [response_time] {
      mutate {
        convert => { "response_time" => "float" }
      }
    }
  }

  # 解析GC日志
  if [log_type] == "gc" {
    grok {
      match => {
        "message" => '\[GC\s*(?<gc_type>\w+).*?\[.*?\]\s*(?<gc_before>\d+K)->(?<gc_after>\d+K)\(.*?\)\s*(?<gc_time>\d+\.\d+)'
      }
    }

    if [gc_time] {
      mutate {
        convert => { "gc_time" => "float" }
      }
    }
  }

  # 日期解析
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss,SSS", "yyyy-MM-dd HH:mm:ss"]
      target => "@timestamp"
      timezone => "Asia/Shanghai"
    }
  }

  # 添加环境标签
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:unknown}"
      "application" => "ai-ready"
    }
  }

  # 删除不必要的字段
  mutate {
    remove_field => ["host", "agent", "ecs", "input", "log"]
  }

  # 标记错误级别日志
  if [log_level] in ["ERROR", "FATAL", "WARN"] {
    mutate {
      add_tag => ["alert"]
    }
  }
}

output {
  # 输出到Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ai-ready-%{[log_type]}-%{+YYYY.MM.dd}"
    # username => "${ELASTICSEARCH_USERNAME}"
    # password => "${ELASTICSEARCH_PASSWORD}"
  }

  # 错误日志额外输出到文件
  if "alert" in [tags] {
    file {
      path => "/var/log/logstash/alerts/%{+YYYY-MM-dd}.log"
      codec => line { format => "%{message}" }
    }
  }

  # 调试输出 (开发环境)
  # stdout {
  #   codec => rubydebug
  # }
}
