# AI-Ready Docker Compose Configuration (Host Mode)
# Project: 智企连·AI-Ready
# Run AI-Ready API on Windows host network mode
# Last Updated: 2026-04-01

services:
  # AI-Ready API Service (Host Network)
  api:
    image: eclipse-temurin:17-jre-alpine
    container_name: ai-ready-api
    network_mode: "host"
    working_dir: /app
    volumes:
      - I:/AI-Ready:/opt/ai-ready
    environment:
      SPRING_PROFILES_ACTIVE: local
      JAVA_OPTS: -Xms512m -Xmx1024m
    entrypoint: |
      sh -c "
        echo '======================================' &&
        echo 'AI-Ready 启动中...' &&
        echo '======================================' &&
        java -jar /opt/ai-ready/core-api/target/core-api-1.0.0-SNAPSHOT.jar
      "
    restart: unless-stopped
