# AI-Ready Runtime Configurations
# Multi-stage Docker Compose for AI-Ready
# Version: v1.0

version: '3.8'

services:
  # AI-Ready API Service (Production Ready)
  api:
    image: ghcr.io/ai-ready/ai-ready-api:${IMAGE_TAG:-latest}
    container_name: ai-ready-api
    ports:
      - "8080:8080"
    environment:
      # Spring Boot Configuration
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/ai_ready}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-ai_ready_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD}
      SPRING_NACOS_DISCOVERY_SERVER_ADDR: ${SPRING_NACOS_DISCOVERY_SERVER_ADDR:-nacos:8848}
      
      # JVM Configuration
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200}
      
      # Application Version
      APP_VERSION: ${APP_VERSION:-1.0.0}
      
      # Timezone
      TZ: Asia/Shanghai
      
      # Logging
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    volumes:
      - api_logs:/app/logs
      - ./configs:/app/config:ro
    restart: unless-stopped
    deploy:
      replicas: ${REPLICA_COUNT:-1}
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
    networks:
      - ai-ready-network

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: ai-ready-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_ready_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_ready}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_ready_user} -d ${POSTGRES_DB:-ai_ready}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-ready-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Nacos Service Registry & Config Center
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: ai-ready-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE:-true}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-SecretKey012345678901234567890123456789012345678901234567890123456789}
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ai-ready-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/prometheus/rules.yml:/etc/prometheus/rules/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ai-ready-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_FEATURE_TOGGLES_ENABLE: fluentdMetrics
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Log Collector (Filebeat)
  filebeat:
    image: elastic/filebeat:8.7.0
    container_name: ai-ready-filebeat
    user: root
    volumes:
      - api_logs:/app/logs:ro
      - ./configs/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - filebeat_data:/usr/share/filebeat/data
    depends_on:
      - redis
      - elasticsearch
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Elasticsearch (for Log Aggregation)
  elasticsearch:
    image: elastic/elasticsearch:8.7.0
    container_name: ai-ready-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-ready-network

volumes:
  postgres_data:
  redis_data:
  nacos_data:
  prometheus_data:
  grafana_data:
  filebeat_data:
  elasticsearch_data:
  api_logs:

networks:
  ai-ready-network:
    driver: bridge
    name: ai-ready-network