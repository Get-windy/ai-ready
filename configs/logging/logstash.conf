# AI-Ready Logstash Configuration
# Log Processing and Enrichment
# Version: v1.0

input {
  # From Filebeat
  beats {
    port => 5044
    host => "0.0.0.0"
    client_inactivity_timeout => 3600
  }
  
  # From TCP (Legacy)
  tcp {
    port => 5000
    codec => json_lines
  }
  
  # From UDP
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # JSON parsing
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed_json"
    }
    mutate {
      replace => { "message" => "%{parsed_json}" }
    }
  }
  
  # Timestamp parsing
  date {
    match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS", "ISO8601" ]
    target => "@timestamp"
  }
  
  # Log level parsing
  mutate {
    split => { "message" => " " }
    add_field => { "log_level" => "%{[message][5]}" }
  }
  
  # Remove unnecessary fields
  mutate {
    remove_field => [ "agent", "ecs", "host", "input", "log", "serialize" ]
  }
  
  # Add environment tag
  mutate {
    add_field => { "environment" => "${ENV:-dev}" }
    add_field => { "service" => "ai-ready-api" }
    add_field => { "team" => "ai-ready" }
  }
  
  # GeoIP enrichment (Optional)
  # geoip {
  #   source => "client_ip"
  #   target => "geoip"
  # }
  
  # User agent parsing (Optional)
  # useragent {
  #   source => "http_user_agent"
  #   target => "user_agent"
  # }
}

output {
  # Elasticsearch Output
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ai-ready-logs-%{+yyyy.MM.dd}"
    user => "${ELASTICSEARCH_USERNAME:-elastic}"
    password => "${ELASTICSEARCH_PASSWORD:-changeme}"
    template_name => "ai-ready-logs"
    template_overwrite => true
  }
  
  # Log file output (Optional, for debugging)
  # file {
  #   path => "/tmp/logstash-%{+yyyy-MM-dd}.log"
  #   codec => rubydebug
  # }
  
  # Console output (Debug only)
  # stdout {
  #   codec => rubydebug
  # }
}

# Pipeline Settings
pipeline.workers: 2
pipeline.batch.size: 125
pipeline.batch.delay: 50
queue.type: persisted
queue.max_bytes: 1gb