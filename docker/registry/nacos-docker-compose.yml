# Nacos Docker Compose Configuration
# Service Registry Center for AI-Ready
# Version: v2.2.3

version: '3.8'

services:
  # Nacos Server - Standalone Mode
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: ai-ready-nacos
    hostname: nacos
    ports:
      - "8848:8848"    # Nacos API Port
      - "9848:9848"    # Nacos gRPC Port
      - "9849:9849"    # Nacos gRPC Port for Server
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      
      # MySQL Configuration
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: nacos
      MYSQL_SERVICE_PASSWORD: Nacos@2026
      
      # JVM Configuration
      JVM_XMS: 512m
      JVM_XMX: 1024m
      JVM_XMN: 256m
      
      # Nacos Authentication
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      
      # Nacos Server Configuration
      NACOS_SERVER_PORT: 8848
      NACOS_SERVER_IP: ${NACOS_SERVER_IP:127.0.0.1}
      
    volumes:
      - ./logs/nacos:/home/nacos/logs
      - ./data/nacos:/home/nacos/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-ready-network

  # MySQL for Nacos Persistence
  mysql:
    image: mysql:8.0
    container_name: ai-ready-nacos-mysql
    hostname: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Root@2026#Nacos
      MYSQL_DATABASE: nacos
      MYSQL_USER: nacos
      MYSQL_PASSWORD: Nacos@2026
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./configs/nacos/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Prometheus for Nacos Monitoring
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ai-ready-nacos-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/nacos/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - nacos
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Grafana for Nacos Dashboard
  grafana:
    image: grafana/grafana:10.0.0
    container_name: ai-ready-nacos-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/nacos/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./configs/nacos/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: nacos-datasource
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ai-ready-network

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  ai-ready-network:
    driver: bridge
    name: ai-ready-net