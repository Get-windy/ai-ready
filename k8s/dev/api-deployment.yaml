# AI-Ready Kubernetes Deployment - Development Environment
# Environment: Dev
# Version: v1.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ready-api
  namespace: ai-ready-dev
  labels:
    app: ai-ready-api
    version: v1.0.0
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ready-api
  template:
    metadata:
      labels:
        app: ai-ready-api
        version: v1.0.0
        env: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: ai-ready-sa
      containers:
        - name: ai-ready-api
          image: ghcr.io/ai-ready/ai-ready-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            # Application Config
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            
            # Database Config
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.ai-ready-dev.svc.cluster.local:5432/devdb"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ai-ready-secrets
                  key: db-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-ready-secrets
                  key: db-password
            
            # Redis Config
            - name: SPRING_REDIS_HOST
              value: "redis.ai-ready-dev.svc.cluster.local"
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-ready-secrets
                  key: redis-password
            
            # Nacos Config
            - name: NACOS_SERVER_ADDR
              value: "nacos.ai-ready-dev.svc.cluster.local:8848"
            - name: NACOS_NAMESPACE
              value: "ai-ready-dev"
            
            # JVM Options
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
            
            # App Version
            - name: APP_VERSION
              value: "1.0.0-dev"
            
            # Timezone
            - name: TZ
              value: "Asia/Shanghai"
            
            # Logging
            - name: LOGGING_LEVEL_ROOT
              value: "DEBUG"
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: log-volume
              mountPath: /app/logs
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: config-volume
          configMap:
            name: ai-ready-config
        - name: log-volume
          emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ai-ready-api
                topologyKey: kubernetes.io/hostname
      
      terminationGracePeriodSeconds: 30

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: ai-ready-api
  namespace: ai-ready-dev
  labels:
    app: ai-ready-api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: ai-ready-api

---
# Ingress (Development)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-ready-api-ingress
  namespace: ai-ready-dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
spec:
  rules:
    - host: dev.ai-ready.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-ready-api
                port:
                  number: 8080

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-ready-api-pdb
  namespace: ai-ready-dev
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-ready-api

---
# PersistentVolumeClaim (for logs)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-ready-api-pvc
  namespace: ai-ready-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard