# AI-Ready Kubernetes Base Configuration
# Single source of truth for K8s resources
# Version: v1.0

apiVersion: v1
kind: Namespace
metadata:
  name: ai-ready
  labels:
    name: ai-ready
    managed-by: devops
    env: shared

---
# ConfigMap - Application Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-ready-config
  namespace: ai-ready
  labels:
    app: ai-ready-api
data:
  application.yml: |
    spring:
      application:
        name: ai-ready-api
      cloud:
        nacos:
          discovery:
            server-addr: ${NACOS_SERVER_ADDR}
            namespace: ${NACOS_NAMESPACE}
          config:
            server-addr: ${NACOS_SERVER_ADDR}
    
    server:
      servlet:
        context-path: /api
  
  application-production.yml: |
    spring:
      datasource:
        url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
        username: ${DB_USER}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
      redis:
        host: ${REDIS_HOST}
        port: ${REDIS_PORT}
        password: ${REDIS_PASSWORD}
    logging:
      level:
        root: INFO

---
# Secret - Sensitive Data
apiVersion: v1
kind: Secret
metadata:
  name: ai-ready-secrets
  namespace: ai-ready
  labels:
    app: ai-ready-api
type: Opaque
data:
  # Base64 encoded values
  db-password: cHJvZC1wYXNzd29yZA==
  redis-password: cmVkaXMtcGFzc3dvcmQ=
  jwt-secret:南-aeidon-ai-ready-secret-key-2026
  nacos-auth-token: U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODk=

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-ready-sa
  namespace: ai-ready
  labels:
    app: ai-ready-api

---
# Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-ready-role
  namespace: ai-ready
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-ready-rolebinding
  namespace: ai-ready
subjects:
  - kind: ServiceAccount
    name: ai-ready-sa
    namespace: ai-ready
roleRef:
  kind: Role
  name: ai-ready-role
  apiGroup: rbac.authorization.k8s.io

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-ready-api-hpa
  namespace: ai-ready
  labels:
    app: ai-ready-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-ready-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"

---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-ready-network-policy
  namespace: ai-ready
spec:
  podSelector:
    matchLabels:
      app: ai-ready-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: nacos
      ports:
        - protocol: TCP
          port: 8848
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443