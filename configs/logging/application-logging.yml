# AI-Ready Log Configuration
# Logging Framework Configuration
# Version: v1.0

spring:
  application:
    name: ai-ready-api
  
  logging:
    level:
      root: INFO
      cn.aiedge: DEBUG
      org.springframework: INFO
      com.baomidou.mybatisplus: INFO
      io.swagger: WARN
      springfox: WARN
      
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [trace:%X{traceId}] - %msg%n"
      file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [trace:%X{traceId}] - %msg%n"
      
    file:
      name: /app/logs/ai-ready-api.log
      max-size: 100MB
      max-history: 30
      total-size-cap: 10GB
      
    logback:
      rolling-policy:
        max-file-size: 100MB
        max-history: 30
        total-size-cap: 10GB

# Slf4j MDC Configuration
logging:
  mdc:
    keys:
      - traceId
      - requestId
      - userId
      - service
      - method

