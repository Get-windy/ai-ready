# ==================== 性能调优 ====================
queue:
  mem:
    events: 4096
    flush.min_events: 512
    flush.timeout: 1s

spooler:
  flush_interval: 1s
  batch_size: 2048
  batch_timeout: 10s

# ==================== 索引模板设置 ====================
setup.template:
  name: "ai-ready"
  pattern: "ai-ready-*"
  enabled: true
  overwrite: false
  settings:
    index.number_of_shards: 2
    index.number_of_replicas: 1
    index.refresh_interval: "5s"
    index.lifecycle.name: "ai-ready-policy"
    index.lifecycle.rollover_alias: "ai-ready"

# ==================== Kibana设置 ====================
setup.kibana:
  host: "kibana:5601"
  protocol: "http"
  path: ""
  ssl.enabled: false

# ==================== 监控设置 ====================
monitoring:
  enabled: true
  cluster_uuid: "ai-ready-cluster"
  elasticsearch:
    hosts: ["http://elasticsearch:9200"]
    # username: "${ELASTICSEARCH_USERNAME}"
    # password: "${ELASTICSEARCH_PASSWORD}"
  metrics:
    enabled: true
    period: 30s
  state:
    enabled: true
    period: 60s

# ==================== 日志配置 ====================
logging:
  level: info
  to_files: true
  files:
    path: /var/log/filebeat
    name: filebeat.log
    keepfiles: 7
    permissions: 0644
    interval: 0
  selectors: ["*"]
  metrics:
    enabled: true
    period: 30s

# ==================== HTTP端点 (健康检查) ====================
http:
  enabled: true
  host: 0.0.0.0
  port: 5066

