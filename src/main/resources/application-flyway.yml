-- =============================================
-- AI-Ready Flyway Migration Configuration
-- Version: 1.0.0
-- Framework: Spring Boot 3.2.x + MyBatis-Plus
-- Database: PostgreSQL 14+
-- =============================================

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.ignore-future-migrations=true
spring.flyway.validate-on-migrate=true
spring.flyway sql-migration-prefix=V
spring.flyway repeatable-sql-migration-prefix=R
spring.flyway sql-migration-separator=__
spring.flyway sql-migration-suffixes=.sql
spring.flyway table=schema_version
spring.flyway clean-on-validation-error=false
spring.flyway mixed=false
spring.flyway group=false
spring.flyway placeholder-replacement=true
spring.flyway placeholders=
spring.flyway placeholders.placeholders-are-required=false

# Flyway Migration Scripts Location
# src/main/resources/db/migration/
# V1.0.0__Initial_Schema.sql
# V1.0.1__Add_Columns.sql
# V1.0.2__Data_Migration.sql
# R1.0.0__Troubleshooting_Guide.sql