# AI-Ready 资源配额和限制配置
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-ready-quota
  namespace: ai-ready
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    services: "20"
    secrets: "50"
    configmaps: "50"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ai-ready-limits
  namespace: ai-ready
spec:
  limits:
  - type: Container
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    max:
      cpu: 4000m
      memory: 8Gi
    min:
      cpu: 50m
      memory: 64Mi
  - type: PersistentVolumeClaim
    max:
      storage: 500Gi
    min:
      storage: 1Gi
---
# 服务资源需求参考
# ai-ready-api: 500m-2000m CPU, 512Mi-2Gi 内存
# postgres: 1000m-4000m CPU, 1Gi-4Gi 内存
# redis: 200m-1000m CPU, 256Mi-1Gi 内存
# ai-engine: 2000m-4000m CPU, 2Gi-8Gi 内存
