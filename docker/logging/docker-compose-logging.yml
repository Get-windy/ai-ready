# AI-Ready ELK Stack Docker Compose Configuration
# Elasticsearch + Logstash + Kibana + Filebeat
# Version: v1.0

version: '3.8'

services:
  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.7.0
    container_name: ai-ready-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - ELASTIC_PASSWORD=changeme
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./configs/logging/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Logstash
  logstash:
    image: logstash:8.7.0
    container_name: ai-ready-logstash
    ports:
      - "5044:5044"
      - "5000:5000"
      - "5000:5000/udp"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme
      - LS_JAVA_OPTS=-Xmx512m -Xms512m
      - ENV=development
    volumes:
      - ./configs/logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Kibana
  kibana:
    image: kibana:8.7.0
    container_name: ai-ready-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme
      - XPACK_SECURITY_ENABLED=false
    volumes:
      - ./configs/logging/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Filebeat - Log Collector
  filebeat:
    image: elastic/filebeat:8.7.0
    container_name: ai-ready-filebeat
    user: root
    volumes:
      - ./configs/logging/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/app/logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log/syslog:/var/log/syslog:ro
      - filebeat_data:/usr/share/filebeat/data
    depends_on:
      - elasticsearch
      - logstash
    restart: unless-stopped
    networks:
      - ai-ready-network

  # Log Viewer (logview)
  logviewer:
    image:偡ck/logview:latest
    container_name: ai-ready-logviewer
    ports:
      - "8000:8000"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - LOG_INDEX=ai-ready-logs-*
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - ai-ready-network

volumes:
  elasticsearch_data:
  filebeat_data:

networks:
  ai-ready-network:
    driver: bridge
    name: ai-ready-logs-network