# AI-Ready Docker Compose Configuration
# Project: 智企连·AI-Ready
# Version: v1.0
# Last Updated: 2026-03-28

version: '3.8'

services:
  # AI-Ready API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-ready:latest
    container_name: ai-ready-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-development}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/devdb}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-devuser}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-Dev@2026#Local}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_ROCKETMQ_NAME_SERVER: ${SPRING_ROCKETMQ_NAME_SERVER:-rocketmq:9876}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:14
    container_name: ai-ready-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Dev@2026#Local}
      POSTGRES_DB: ${POSTGRES_DB:-devdb}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devuser} -d ${POSTGRES_DB:-devdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-ready-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: ai-ready-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-Xms128m -Xmx128m"
    restart: unless-stopped

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: ai-ready-rocketmq-broker
    ports:
      - "10911:10911"
      - "10912:10912"
      - "10913:10913"
    command: sh mqbroker -n rocketmq-namesrv:9876
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
    depends_on:
      - rocketmq-namesrv
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ai-ready-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/alerting/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/alerting/rules.yml:/etc/prometheus/rules/rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
    restart: unless-stopped

  # AlertManager
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: ai-ready-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./configs/alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    depends_on:
      - prometheus
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:9.5.0
    container_name: ai-ready-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/alerting/dashboards.yml:/etc/grafana/provisioning/dashboards/default.yml
      - ./configs/alerting/*.json:/var/lib/grafana/dashboards/
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_AUTH_ANONYMOUS_ORDERS_TEAM_ORG_ROLE: Admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  default:
    driver: bridge
